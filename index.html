<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lankan Herbarium | Local Plant Dictionary</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a nature feel -->
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo">
                <h1>Sri Lankan <span>Herbarium</span></h1>
            </div>
            <div class="role-selector">
                <span id="roleLabel">User View</span>
                <button id="switchRoleBtn" class="btn btn-secondary">Switch to Admin</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="searchView">
            <section class="search-section">
                <input type="text" id="searchInput" placeholder="Search by name or scientific name (e.g., Beli, Kohomba)...">
                <div class="admin-actions hidden" id="adminControls">
                    <button id="addPlantBtn" class="btn btn-primary">Add New Plant</button>
                    <button id="viewAllBtn" class="btn btn-secondary">View All Plants Library</button>
                </div>
            </section>

            <!-- Recently Viewed Section (User View) -->
            <section id="recentSection" class="hidden" style="margin-top: 40px;">
                <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <h3 style="color: var(--accent-color); margin: 0;">Recently Viewed Plants</h3>
                    <button id="clearRecentBtn" class="btn btn-sm" style="background-color: #f44336; color: white; border-radius: 4px; padding: 2px 8px; font-size: 0.7rem;">Clear History</button>
                </div>
                <div id="recentGrid" class="recent-grid">
                    <!-- Recent cards will be injected here -->
                </div>
                <hr style="margin: 40px 0; border: 0; border-top: 1px solid #ddd;">
            </section>

            <section class="results-section">
                <div id="plantGrid" class="plant-grid">
                    <!-- Plant cards will be injected here -->
                </div>
            </section>
        </section>

        <!-- Specific Plant Detail Overlay (Simulated Tab with Blur) -->
        <div id="detailView" class="detail-overlay hidden">
            <div class="detail-modal-tab" id="captureCard">
                <div class="detail-modal-header">
                    <button id="backBtn" class="btn btn-secondary">&larr; Go back to search</button>
                    <span class="detail-close-icon" onclick="hideDetailView()">&times;</span>
                </div>
                <div class="detail-container">
                    <div class="detail-image">
                        <img id="detailImg" src="" alt="Plant Image" crossorigin="anonymous">
                    </div>
                    <div class="detail-content">
                        <span id="detailCategory" class="plant-category"></span>
                        <h2 id="detailName" class="copyable" title="Click to copy" onclick="copyText(this.textContent, event)"></h2>
                        <span id="detailScientific" class="scientific-name copyable" style="font-size: 1.2rem; margin-bottom: 20px;" title="Click to copy" onclick="copyText(this.textContent, event)"></span>
                        <div class="detail-uses-box">
                            <h3>Primary Uses & Benefits</h3>
                            <p id="detailUses"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Add/Edit Plant -->
    <div id="plantModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modalTitle">Add New Plant</h2>
            <form id="plantForm">
                <input type="hidden" id="plantId">
                <div class="form-group">
                    <label for="plantName">Plant Name (Common)</label>
                    <input type="text" id="plantName" required>
                </div>
                <div class="form-group">
                    <label for="scientificName">Scientific Name</label>
                    <input type="text" id="scientificName" required>
                </div>
                <div class="form-group">
                    <label for="plantImage">Image URL (e.g., https://example.com/plant.jpg)</label>
                    <input type="url" id="plantImage" placeholder="https://source.unsplash.com/800x600/?plant">
                </div>
                <div class="form-group">
                    <label for="plantUses">Uses (Medicinal, Culinary, etc.)</label>
                    <textarea id="plantUses" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="plantCategory">Category</label>
                    <select id="plantCategory">
                        <option value="Medicinal">Medicinal</option>
                        <option value="Culinary">Culinary</option>
                        <option value="Ornamental">Ornamental</option>
                        <option value="Endemic">Endemic</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save Plant</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
