<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Details | Sri Lankan Herbarium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: var(--background-color); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .details-page-card { background: var(--white); width: 100%; max-width: 600px; border-radius: 30px; overflow: hidden; box-shadow: var(--shadow-bold); animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .details-hero { height: 350px; position: relative; }
        .details-hero img { width: 100%; height: 100%; object-fit: cover; }
        .details-body { padding: 40px; }
        .close-hint { margin-top: 30px; text-align: center; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>
    <div class="details-page-card">
        <div class="details-hero">
            <img id="detailImg" src="" alt="Plant Image">
        </div>
        <div class="details-body">
            <span id="detailCategory" class="plant-category"></span>
            <h2 id="detailName" style="font-size: 2.2rem; margin-bottom: 5px;"></h2>
            <span id="detailScientific" class="scientific-name" style="font-size: 1.1rem; margin-bottom: 30px;"></span>
            
            <div style="background: #f8faf9; padding: 30px; border-radius: 20px; border-left: 5px solid var(--accent-color);">
                <h4 style="font-size: 0.9rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.1em;">Uses & Botanical Benefits</h4>
                <p id="detailUses" style="font-size: 1rem; color: var(--text-secondary); line-height: 1.8;"></p>
            </div>

            <div class="close-hint">
                <button class="btn btn-primary" onclick="window.close()" style="width: 100%; margin-top: 20px;">
                    <i class="fas fa-times"></i> Close Window
                </button>
                <p style="margin-top: 15px;">You can also close this tab to return to the library</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const plantId = urlParams.get('id');
        const plants = JSON.parse(localStorage.getItem('herbarium_plants')) || [];
        const plant = plants.find(p => p.id == plantId);

        if (plant) {
            document.title = `${plant.name} | Sri Lankan Herbarium`;
            document.getElementById('detailImg').src = plant.imageUrl || `https://source.unsplash.com/800x600/?plant,${plant.name}`;
            document.getElementById('detailName').textContent = plant.name;
            document.getElementById('detailScientific').textContent = plant.scientificName;
            document.getElementById('detailCategory').textContent = plant.category;
            document.getElementById('detailUses').textContent = plant.uses;
        } else {
            document.body.innerHTML = '<h1>Plant not found.</h1>';
        }
    </script>
</body>
</html>
