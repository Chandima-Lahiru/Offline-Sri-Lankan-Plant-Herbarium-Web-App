<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lankan Herbarium | Botanical Dictionary</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo">
                <h1>Sri Lankan <span>Herbarium</span></h1>
            </div>
            <div class="role-selector">
                <span id="roleLabel" style="font-weight: 700; margin-right: 15px; opacity: 0.8;">USER VIEW</span>
                <button id="switchRoleBtn" class="btn btn-secondary"><i class="fas fa-user-shield"></i> Switch to Admin</button>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="searchView">
            <section class="search-section">
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Search by name or scientific name (e.g., Beli, Kohomba)...">
                    <button id="clearSearchBtn" class="clear-btn" style="position: absolute; right: 25px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.5rem; color: #ccc; cursor: pointer; display: none;">&times;</button>
                </div>
                <div class="admin-actions hidden" id="adminControls" style="display: flex; justify-content: center; gap: 15px;">
                    <button id="addPlantBtn" class="btn btn-primary" style="background-color: var(--primary-light);"><i class="fas fa-plus"></i> Add New Plant</button>
                    <button id="viewAllBtn" class="btn btn-primary"><i class="fas fa-leaf"></i> Full Library</button>
                </div>
            </section>

            <section id="recentSection" class="hidden" style="margin-bottom: 60px;">
                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                    <h3 style="font-size: 1.2rem;">RECENTLY VIEWED</h3>
                    <div style="flex-grow: 1; height: 1px; background: #eee;"></div>
                    <button id="clearRecentBtn" class="btn btn-sm" style="font-size: 0.7rem; padding: 5px 15px; background: #fdeaea; color: #e63946;">CLEAR</button>
                </div>
                <div id="recentGrid" class="plant-grid"></div>
            </section>

            <section class="results-section">
                <div id="plantGrid" class="plant-grid"></div>
            </section>
        </section>

        <!-- Detail Overlay -->
        <div id="detailView" class="detail-overlay hidden">
            <div class="detail-modal-tab">
                <div class="detail-image">
                    <img id="detailImg" src="" alt="Plant Image">
                </div>
                <div class="detail-content">
                    <span id="detailCategory" class="plant-category"></span>
                    <h2 id="detailName" style="font-size: 2.2rem; margin-bottom: 5px;"></h2>
                    <span id="detailScientific" class="scientific-name" style="font-size: 1.1rem; margin-bottom: 25px;"></span>
                    
                    <div style="background: #f8faf9; padding: 25px; border-radius: 20px; border-left: 5px solid var(--accent-color);">
                        <h4 style="font-size: 0.9rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.1em;">Uses & Benefits</h4>
                        <p id="detailUses" style="font-size: 1rem; color: var(--text-secondary); line-height: 1.8;"></p>
                    </div>

                    <button id="backBtn" class="btn btn-primary" style="margin-top: 30px; width: 100%;"><i class="fas fa-arrow-left"></i> Back to Herbarium</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Admin Form Modal -->
    <div id="plantModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Plant</h2>
                <p style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 5px;">Fill in the details to update the Sri Lankan Herbarium</p>
            </div>
            
            <form id="plantForm">
                <input type="hidden" id="plantId">
                
                <div class="modal-grid">
                    <div class="modal-left">
                        <div class="form-group">
                            <label>Common Plant Name</label>
                            <input type="text" id="plantName" placeholder="e.g., Kohomba" required>
                        </div>
                        <div class="form-group">
                            <label>Scientific Name</label>
                            <input type="text" id="scientificName" placeholder="e.g., Azadirachta indica" required>
                        </div>
                        <div class="form-group">
                            <label>Botanical Category</label>
                            <select id="plantCategory">
                                <option value="Medicinal">Medicinal</option>
                                <option value="Culinary">Culinary</option>
                                <option value="Ornamental">Ornamental</option>
                                <option value="Endemic">Endemic</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="modal-right">
                        <div class="form-group">
                            <label>Image Source</label>
                            <input type="url" id="plantImage" placeholder="Paste an image URL here...">
                        </div>
                        <div class="form-group" style="margin-top: -10px;">
                            <label style="text-align: center; margin: 10px 0;">OR UPLOAD LOCAL FILE</label>
                            <input type="file" id="imageUpload" accept="image/*" style="padding: 10px; border: 2px dashed #eee;">
                        </div>
                        <div class="image-preview-box" id="imagePreview">
                            <span style="color: #999; font-size: 0.8rem;">Image Preview</span>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label>Uses & Botanical Benefits</label>
                    <textarea id="plantUses" rows="4" placeholder="Describe the uses, benefits, and traditional importance..." required></textarea>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" style="flex-grow: 2;"><i class="fas fa-save"></i> Save Botanical Record</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn" style="flex-grow: 1; color: var(--primary-color);"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
